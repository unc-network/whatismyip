<!doctype html>
<html lang="en">
 <head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="What Is My IP: a service offered by UNC Chapel Hill to provide information about your connection, as seen from the campus network." />
	<meta name="author" content="">
    <meta name="robots" content="index, follow" />
    <title>What is my IP?</title>

	<link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

	<!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}"> -->
    <!-- Font Awesome -->
    <!-- <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    /> -->
    <!-- Google Fonts Roboto -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    />
    <!-- MDB -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mdb.min.css') }}" />

	<!-- Site Specific -->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/whatismyip.css') }}">
	{{ fontawesome_html () }}
 </head>
 <body>
	<body>

		<!-- Navbar -->
		<nav class="navbar navbar-expand-lg navbar-dark navbar-unc">
			<div class="container">
				<a href="https://www.unc.edu" class="navbar-brand">
					<span class="d-none d-md-inline unc-title">The University <em>of</em> North Carolina <em>at</em> Chapel Hill</span>
					<span class="d-inline d-md-none unc-title">UNC-Chapel Hill</span>
				</a>

				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNav"
					aria-controls="navbarNav"
					aria-expanded="false"
					aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item">
							<a class="nav-link" href="{{ url_for('home') }}">Home</a>
						</li>
						<!-- <li class="nav-item">
							<a class="nav-link" href="{{ url_for('hostinfo') }}">API</a>
						</li> -->
						<li class="nav-item">
							<a class="nav-link" href="{{ url_for('about') }}">About</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>

		<!-- Main Content -->
		<main role="main">
			<div class="container">
				<div class="row">
					<div class="col">
					  <div class="py-5 text-center fst-italic unc-page-title">
						<h2 class="mb-2">What is my IP address?</h2>
					  </div>
					</div>
				  </div>
			{% block content %}
			{% endblock %}
			</div>
		</main>

		<!-- Footer -->
		<footer class="main-footer">
			<div class="container">
				<div class="row">
					<div class="col">
						<div class="border-top my-5"></div>
					</div>
				</div>
				<div class="row mb-5">
					<div class="col-md-6">
						<img src="{{ url_for('static', filename='img/Information-Technology-Services_logo.png') }}" class="d-none d-sm-inline align-text-top" alt="Logo" style="width:273px;">
					</div>
					<div class="col-md-6 text-end">
						<p><small>Copyright &copy; <script>document.write(new Date().getFullYear())</script> - Information Technology Services</small></p>
					</div>
				</div>
			</div>
		</footer>

		<!-- MDB -->
		<script type="text/javascript" src="{{ url_for('static', filename='js/mdb.min.js') }}"></script>
		<script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
		{% block javascript %}
		{% endblock %}
 </body>
</html>
