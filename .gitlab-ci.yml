image: python:3.11

stages:
  - lint
  - security_scan
  - test
  - tag

black_formatting_check:
  stage: lint
  variables:
    WORKDIR: "." # Directory to check, defaults to root
  before_script:
    - pip install black==26.3.1
  script:
    # Run black in check mode: fails if changes are needed
    - black "$WORKDIR" --check --verbose --diff --color
  cache: [] # Prevents caching for this job, ensuring a fresh run

security_scan_pip_audit:
  stage: security_scan
  script:
    - python3 -m ensurepip
    - python3 -m pip install --upgrade pip
    # Install project dependencies again to audit the environment
    - python3 -m pip install -r requirements.txt
    # Install pip-audit
    - python3 -m pip install pip-audit
    # Run pip-audit, specifying requirements.txt for clear input
    - pip-audit -r requirements.txt
  allow_failure: true # Optional: allows the pipeline to continue even if vulnerabilities are found initially

run_tests:
  stage: test
  before_script:
    - pip install pytest==9.0.3
    - pip install -r requirements.txt
  script:
    - pytest tests/ -v

tag_release:
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - git config user.email "gitlab-ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - VERSION=$(grep '^__version__' whatismyip/__init__.py | cut -d'"' -f2)
    - TAG="v${VERSION}"
    - echo "Detected version ${TAG}"
    - |
      if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
        echo "Tag ${TAG} already exists — skipping."
      else
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push origin "${TAG}"
        echo "Created and pushed ${TAG}"
      fi

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml