image: python:3.11

stages:
  - lint
  - security_scan
  - test
  - tag

# Shared pip cache — all jobs that install from requirements.txt benefit.
# Keyed on the requirements file so a lock-file change busts the cache.
.pip_cache: &pip_cache
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
    policy: pull-push

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

ruff_lint:
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check .
  cache: []

black_formatting_check:
  stage: lint
  variables:
    WORKDIR: "."
  before_script:
    - pip install black==26.3.1
  script:
    - black "$WORKDIR" --check --verbose --diff --color
  cache: []

security_scan_pip_audit:
  stage: security_scan
  <<: *pip_cache
  before_script:
    - pip install pip-audit
    - pip install -r requirements.txt
  script:
    - pip-audit -r requirements.txt

security_scan_bandit:
  stage: security_scan
  before_script:
    - pip install bandit
  script:
    # -ll = medium severity and above; -ii = medium confidence and above
    - bandit -r whatismyip/ -ll -ii --exclude whatismyip/extreme.py
  cache: []

run_tests:
  stage: test
  <<: *pip_cache
  before_script:
    - pip install pytest==9.0.3 pytest-cov
    - pip install -r requirements.txt
  script:
    # extreme.py and utils.py are external-API clients; omit from threshold.
    - pytest tests/ -v --cov=whatismyip --cov-fail-under=50 --cov-report=term-missing --cov-config=setup.cfg

tag_release:
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - git config user.email "gitlab-ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - VERSION=$(grep '^__version__' whatismyip/__init__.py | cut -d'"' -f2)
    - TAG="v${VERSION}"
    - echo "Detected version ${TAG}"
    - |
      if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
        echo "Tag ${TAG} already exists — skipping."
      else
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push origin "${TAG}"
        echo "Created and pushed ${TAG}"
      fi

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
