[lint]
select = ["E", "F"]
ignore = [
    "E501",  # line too long — black owns line length
    "F403",  # star imports (from whatismyip.utils import *)
    "F405",  # names from star imports (same reason)
    "E711",  # comparison to None — extreme.py uses == None style
    "E712",  # comparison to True/False — same
]
