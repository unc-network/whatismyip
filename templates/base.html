<!doctype html>
<html lang="en">
 <head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="What Is My IP: a service offered by UNC Chapel Hill to provide information about your connection, as seen from the campus network." />
	<meta name="author" content="">
    <meta name="robots" content="index, follow" />
    <title>What is my IP?</title>

	<link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/whatismyip.css') }}">
 </head>
 <body>
	<body>
		<main role="main">

			<!-- Navbar -->
			<nav class="navbar navbar-expand-lg navbar-light bg-white">
				<div class="container">
					<a href="#" class="navbar-brand">
						<img src="{{ url_for('static', filename='images/Old_Well_mark.png') }}" class="d-block d-sm-none" alt="Old Well Logo" width="45" style="opacity: .8">
						<img src="{{ url_for('static', filename='images/Information-Technology-Services_logo.png') }}" class="d-none d-sm-block" alt="Logo" style="width:300px;">
					</a>

					<button class="navbar-toggler" type="button"
						data-bs-toggle="collapse"
						data-bs-target="#navbarNav"
						aria-controls="navbarNav"
						aria-expanded="false"
						aria-label="Toggle navigation">
						<span class="navbar-toggler-icon"></span>
					</button>

					<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
						<ul class="navbar-nav mr-auto">
							<li class="nav-item active">
								<a class="nav-link" aria-current="page" href="{{ url_for('home') }}">Home</a>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="{{ url_for('about') }}">About</a>
							</li>
						</ul>
					</div>
				</div>
			</nav>
			<!-- Navbar -->

			<div class="p-5 text-center bg-light">
				<h1 class="mb-3">What is my IP?</h1>
			</div>

			<div class="container">
				{% block content %}
				{% endblock %}
			</div>

		</main>

		<div class="container">
			<footer class="main-footer">
				<strong>Copyright &copy; <script>document.write(new Date().getFullYear())</script> - Information Technology Services</strong>
			</footer>
		</div>

		<script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
		<script type="text/javascript" src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
		<script src="{{ url_for('static', filename='js/whatismyip.js') }}"></script>
 </body>
</html>
