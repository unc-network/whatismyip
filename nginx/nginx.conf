# What Is My IP — nginx reverse proxy configuration
# -------------------------------------------------------
# Edit the two values marked CHANGEME before starting:
#   1. server_name  — your institution's domain
#   2. ssl_certificate / ssl_certificate_key — paths to your cert files
#
# Place your certificate files in ./nginx/certs/ on the host:
#   nginx/certs/cert.pem   — full certificate chain
#   nginx/certs/key.pem    — private key
#
# To generate a self-signed cert for testing:
#   mkdir -p nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/key.pem -out nginx/certs/cert.pem \
#     -subj "/CN=whatismyip.yourinstitution.edu"

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name whatismyip.yourinstitution.edu;  # CHANGEME

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name whatismyip.yourinstitution.edu;  # CHANGEME

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Pass requests to the application container
    location / {
        proxy_pass         http://whatismyip:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
